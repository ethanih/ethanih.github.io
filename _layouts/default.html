<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description }}">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <nav class="nav" aria-label="Primary navigation">
        <a class="brand" href="{{ '/' | relative_url }}">GUO Yiheng</a>
        <div class="nav-links">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}aria-current="page"{% endif %}>About</a>
          <a href="{{ '/mynotes/' | relative_url }}" {% if page.url == '/mynotes/' %}aria-current="page"{% endif %}>Notes</a>
        </div>
      </nav>
    </header>

    <main class="page">
      {{ content }}
    </main>

    <footer class="site-footer">
      <span>&copy; {{ 'now' | date: '%Y' }} GUO Yiheng</span>
      <a href="mailto:yguocn@connect.ust.hk">yguocn@connect.ust.hk</a>
    </footer>
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
